[pytest]
testpaths = tests
# pytest-asyncio "auto" mode: async test functions are detected and
# dispatched automatically without needing @pytest.mark.asyncio markers.
# Sync tests stay sync. Required for the MCP test suite, where the tools
# are now async-def and tests await them.
asyncio_mode = auto
markers =
    unit: Pure logic / helper function tests (no Flask app, no network)
    integration: Flask test-client route tests with mocked SSH/FS
    mcp: MCP server tool/resource contract tests
    live: Tests that hit real clusters or a running app instance
    destructive: Tests that cancel jobs, delete data, or mount/unmount
    local_cluster: Tests that use the first real cluster from config.json (local dev only)
